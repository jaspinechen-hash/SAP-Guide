  <!-- Unlayered overrides win over daisyUI's @layer base, so the custom primary + tweaks always apply -->
  <style>
    :root, [data-theme="light"] {
      --color-primary: #2541b2;
      --color-primary-content: #ffffff;
      --color-base-200: #f4f6fc;
      --color-base-300: #e3e8f4;
      --radius-box: 0.85rem;
      --radius-field: 0.5rem;
      color-scheme: light;
    }

    html, body { background: var(--color-base-200); }
    body { font-family: "Inter", ui-sans-serif, system-ui, "Segoe UI", sans-serif; color: #1c2433; }
    * { -webkit-font-smoothing: antialiased; }

    .text-prim { color: var(--color-primary) !important; }
    .brand-badge {
      width: 2.1rem; height: 2.1rem; border-radius: .55rem;
      background: var(--color-primary); color: #fff;
      display: grid; place-items: center; font-weight: 700; font-size: .82rem; letter-spacing: .02em;
    }

    /* ---------- Layout: navbar + responsive sidebar ---------- */
    .topbar { position: sticky; top: 0; z-index: 60; background: var(--color-base-100); border-bottom: 1px solid var(--color-base-300); }
    .shell { display: block; }
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 286px;
      background: var(--color-base-100); border-right: 1px solid var(--color-base-300);
      transform: translateX(-102%); transition: transform .25s ease;
      z-index: 70; overflow-y: auto; padding: 1rem .6rem;
    }
    .sidebar.open { transform: translateX(0); }
    .backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.42); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 65; }
    .backdrop.show { opacity: 1; pointer-events: auto; }
    .main-col { min-width: 0; }
    #content { max-width: 880px; margin: 0 auto; padding: 1.5rem 1.25rem 3.5rem; }

    @media (min-width: 1024px) {
      .shell { display: grid; grid-template-columns: 286px minmax(0, 1fr); }
      .sidebar { position: sticky; top: 57px; height: calc(100vh - 57px); transform: none; width: auto; z-index: 1; }
      .backdrop, .hamburger { display: none !important; }
    }

    /* ---------- Sidebar menu ---------- */
    .menu .proc-link { display: flex; flex-direction: column; align-items: flex-start; gap: .05rem; padding: .42rem .6rem; }
    .menu .proc-link .proc-name { font-size: .85rem; font-weight: 500; line-height: 1.25; }
    .menu .proc-link.active { background: color-mix(in srgb, var(--color-primary) 12%, transparent); color: var(--color-primary); }
    .menu .proc-link.active .proc-code { color: var(--color-primary); opacity: .85; }
    .proc-code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .68rem; opacity: .5; }

    /* ---------- Wizard: progress rail ---------- */
    .wiz-rail { display: flex; align-items: center; gap: 0; padding: .35rem .2rem; overflow-x: auto; margin-bottom: 1.1rem; }
    .wiz-dot {
      flex: 0 0 auto; width: 1.95rem; height: 1.95rem; border-radius: 9999px;
      display: grid; place-items: center; font-weight: 700; font-size: .8rem;
      border: 2px solid var(--color-base-300); background: var(--color-base-100); color: #9aa3b8;
      cursor: pointer; transition: background-color .15s, border-color .15s, color .15s, box-shadow .15s;
    }
    .wiz-dot:hover { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-base-300)); color: var(--color-primary); }
    .wiz-dot.done { background: color-mix(in srgb, var(--color-primary) 13%, #fff); border-color: var(--color-primary); color: var(--color-primary); }
    .wiz-dot.current { background: var(--color-primary); border-color: var(--color-primary); color: #fff; box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 17%, transparent); }
    .wiz-line { flex: 1 1 auto; height: 2px; min-width: 12px; background: var(--color-base-300); }
    .wiz-line.done { background: var(--color-primary); }

    /* ---------- Wizard: controls ---------- */
    .wiz-controls { display: flex; align-items: center; gap: .75rem; margin-top: 1.1rem; flex-wrap: wrap; }
    .wiz-progress { flex: 1 1 110px; height: 6px; border-radius: 999px; background: var(--color-base-300); overflow: hidden; min-width: 80px; }
    .wiz-progress-bar { height: 100%; background: var(--color-primary); border-radius: 999px; transition: width .25s ease; }
    .wiz-count { font-size: .78rem; opacity: .6; white-space: nowrap; }
    #wizard { scroll-margin-top: 72px; }

    /* ---------- Step card ---------- */
    .step-num { flex: 0 0 auto; width: 1.9rem; height: 1.9rem; border-radius: 9999px; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; }

    /* ---------- Menu path chips ---------- */
    .menu-path { display: flex; flex-wrap: wrap; align-items: center; gap: .25rem .3rem; }
    .path-seg { background: var(--color-base-200); border: 1px solid var(--color-base-300); border-radius: .4rem; padding: .08rem .45rem; font-size: .76rem; }
    .path-sep { opacity: .35; font-size: .85rem; }

    /* ---------- Prerequisites ---------- */
    .prereq { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .45rem; }
    .prereq li { position: relative; padding-left: 1.05rem; font-size: .82rem; line-height: 1.45; opacity: .85; }
    .prereq li::before { content: ""; position: absolute; left: 0; top: .52em; width: .4rem; height: .4rem; border-radius: 50%; background: var(--color-primary); }

    /* ---------- Markdown body ---------- */
    .md { line-height: 1.6; }
    .md p { margin: .15rem 0; }
    .md strong { font-weight: 600; }
    .md code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .85em; background: var(--color-base-200); border: 1px solid var(--color-base-300); padding: .03rem .32rem; border-radius: .32rem; }
    .md ul, .md ol { padding-left: 1.2rem; margin: .25rem 0; }
    .md li { margin: .12rem 0; }
    .md a { color: var(--color-primary); text-decoration: underline; }

    /* ---------- Field table ---------- */
    .field-table th { font-size: .7rem; text-transform: uppercase; letter-spacing: .03em; opacity: .55; font-weight: 600; }
    .field-table td { font-size: .82rem; vertical-align: top; }
    .field-table .val {
      font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .78rem; white-space: nowrap;
      background: color-mix(in srgb, var(--color-primary) 8%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, transparent);
      color: var(--color-primary); padding: .04rem .4rem; border-radius: .35rem;
    }

    /* ---------- Screenshot placeholder (neutral frame, NOT a SAP UI mock) ---------- */
    .shot { display: block; margin: .15rem 0 0; }
    .shot-frame {
      border: 1px dashed color-mix(in srgb, var(--color-primary) 28%, var(--color-base-300));
      border-radius: .7rem;
      background:
        repeating-linear-gradient(45deg, transparent, transparent 11px, color-mix(in srgb, var(--color-primary) 4%, transparent) 11px, color-mix(in srgb, var(--color-primary) 4%, transparent) 12px),
        linear-gradient(180deg, #fbfcff, var(--color-base-200));
      min-height: 176px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .55rem;
      color: #97a1ba; text-align: center; padding: 1.3rem;
    }
    .shot-frame svg { width: 40px; height: 40px; opacity: .5; }
    .shot-label { font-weight: 600; letter-spacing: .03em; font-size: .76rem; text-transform: uppercase; color: #8b95ad; }
    .shot-tag { font-size: .72rem; font-family: ui-monospace, "SFMono-Regular", monospace; background: var(--color-base-100); border: 1px solid var(--color-base-300); border-radius: .4rem; padding: .12rem .55rem; color: #5f6b85; }
    .shot figcaption { margin-top: .5rem; font-size: .79rem; opacity: .72; line-height: 1.45; }
    .shot .fig-no { font-weight: 600; color: var(--color-primary); opacity: .85; }

    /* ---------- Tip ---------- */
    .tip {
      display: flex; gap: .5rem; align-items: flex-start; font-size: .8rem; line-height: 1.45;
      background: color-mix(in srgb, #f59e0b 9%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, #f59e0b 28%, transparent);
      border-left: 3px solid #f59e0b; border-radius: .5rem; padding: .55rem .7rem;
    }
    .tip-ico { flex: 0 0 auto; }

    /* ---------- Outcome ---------- */
    .outcome {
      display: flex; gap: .65rem; align-items: flex-start; border-radius: .65rem; padding: .85rem 1rem;
      background: color-mix(in srgb, var(--color-success) 10%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent);
    }
    .oc-icon { flex: 0 0 auto; width: 1.45rem; height: 1.45rem; border-radius: 50%; background: var(--color-success); color: #fff; display: grid; place-items: center; font-size: .8rem; font-weight: 700; }

    .verified-badge { background: color-mix(in srgb, var(--color-success) 14%, var(--color-base-100)); color: color-mix(in srgb, var(--color-success) 75%, #000); border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent); }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="navbar min-h-0 py-2 px-3 sm:px-4">
      <div class="flex-1 flex items-center gap-3">
        <button class="hamburger btn btn-ghost btn-square btn-sm" id="hamburger" aria-label="開啟選單">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="brand-badge">MM</div>
        <div class="leading-tight">
          <div class="font-bold text-sm sm:text-base">SAP MM — 操作流程逐步導覽</div>
          <div class="text-xs opacity-55">物料管理 · 逐步操作指南</div>
        </div>
      </div>
      <div class="flex-none hidden sm:flex items-center gap-2">
        <span class="badge badge-sm verified-badge gap-1">經對抗式驗證</span>
        <span class="badge badge-sm badge-ghost">參考範例</span>
      </div>
    </div>

  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

      <main id="content"></main>
      <footer class="text-center text-xs opacity-50 pb-8 px-4">
        SAP MM (ECC / SAP GUI) 的範例逐步導覽。螢幕截圖為占位圖，欄位值僅供示意。
        <span class="hidden sm:inline">使用 ← / → 切換步驟。</span>
      </footer>
    </div>
  </div>

  <div class="backdrop" id="backdrop"></div>

  <!-- Verified procedure content (injected by build step) -->
  <script type="application/json" id="proc-data">[{"code":"MM01","name":"建立物料主檔記錄","group":"主資料","summary":"MM01 透過選擇相關視圖 (基本資料、採購、會計等) 並在適當的組織層次維護這些視圖來建立新的物料主檔記錄，使該物料能在整個採購到付款 (P2P) 循環中使用。","menuPath":"後勤 > 物料管理 > 物料主檔 > 物料 > 建立 (一般) > 立即","prerequisites":["具有交易 MM01 以及相關物料類型、視圖/狀態與組織層次的授權 (授權物件 M_MATE_MAR 物料類型、M_MATE_STA 維護狀態/視圖、M_MATE_WRK 工廠)。","已完成相關 Customizing 設定：物料類型 (例如 HAWA 交易商品 / ROH 原物料)、行業別、工廠 1000、儲存地點 0001 與採購組織 1000 必須已存在。","已定義基本計量單位；對於需評估的視圖 (會計)，需有與物料類型及其科目決定一致的評估類別。"],"steps":[{"title":"開啟 MM01 並進入起始畫面","body":"透過功能表路徑或命令欄位啟動交易 **MM01**。在 **建立物料 (起始畫面)** 上，若使用外部編號則輸入 **物料** 號碼 (若採內部指派則留空)，接著輸入 **行業別** 與 **物料類型**。可選擇使用 **參考自... 物料** 欄位，以既有物料作為新物料的範本。","screenshot":"MM01 起始畫面，標題為「建立物料 (起始畫面)」，顯示物料、行業別與物料類型輸入欄位，下方為「參考自」物料欄位，以及選擇視圖 / 組織層次 / 資料按鈕。","fields":[{"name":"物料","value":"100000","note":"若號碼範圍為內部則留空；僅在外部編號時才輸入"},{"name":"行業別","value":"M (機械工程)","note":"控制欄位選擇與畫面順序"},{"name":"物料類型","value":"HAWA (交易商品)","note":"原物料請使用 ROH；決定哪些視圖/欄位可用"}],"tip":"使用「參考自」搭配既有的類似物料可預先填入資料並節省時間，但務必檢查每個被複製的欄位。"},{"title":"選擇要維護的視圖","body":"按 **Enter** 或點選 **選擇視圖**。在 **選擇視圖** 對話框中，勾選您需要的視圖，例如 **基本資料 1/2**、**採購**、**一般工廠資料/儲存 1** 與 **會計 1**。以綠色勾選 (Enter) 確認。","screenshot":"「選擇視圖」對話框列出所有可維護的視圖並附核取方塊；基本資料 1、基本資料 2、採購、一般工廠資料/儲存 1 與會計 1 已勾選。","fields":[{"name":"視圖","value":"基本資料 1、採購、會計 1","note":"僅選擇該物料用途所需的視圖"},{"name":"僅依需求顯示視圖選擇","value":"未勾選","note":"保留預設，使對話框每次都會出現"}],"tip":"僅勾選您打算維護的視圖；會計/成本視圖需要評估類別並會觸發與評估相關的資料。"},{"title":"輸入組織層次","body":"在 **組織層次** 對話框中，輸入與所選視圖相關的層次：**工廠**、**儲存地點** 與 **採購組織**。這些決定了將被建立的組織專屬資料區段。以 Enter 確認。","screenshot":"「組織層次」對話框，已填入工廠、儲存地點與採購組織輸入欄位，並附選用的「組織層次/設定檔」參考 (參考自) 區段。","fields":[{"name":"工廠","value":"1000","note":"採購與一般工廠資料/儲存視圖所需"},{"name":"儲存地點","value":"0001","note":"儲存 1 視圖所需"},{"name":"採購組織","value":"1000","note":"採購視圖所需"}],"tip":"若您遺漏某個所選視圖需要的組織層次，當您嘗試存取該視圖時 SAP 會重新開啟此對話框。"},{"title":"維護基本資料視圖","body":"在 **基本資料 1** 視圖上，輸入物料簡短文字 (**物料說明**)、**基本計量單位**、**物料群組** 與 **部門**。如有相關，請維護重量/尺寸。","screenshot":"「基本資料 1」頁籤，顯示物料說明「Trading Good T-Shirt」、基本計量單位、物料群組、部門以及毛重/淨重欄位。","fields":[{"name":"物料說明","value":"Trading Good T-Shirt","note":"顯示於憑證中的簡短文字；與語言相依"},{"name":"基本計量單位","value":"EA (個)","note":"庫存管理單位；過帳存在後難以變更"},{"name":"物料群組","value":"00107","note":"為採購/報表將物料分組"},{"name":"部門","value":"00","note":"組織/銷售部門"}],"tip":"一旦存在庫存或憑證，基本計量單位將非常難以變更，因此請在儲存前確認。"},{"title":"維護採購視圖","body":"切換至 **採購** 頁籤 (工廠 1000) 並輸入 **採購群組**，如適用，輸入 **訂購單位** 與 **採購價值碼**。此資料會在採購申請與採購訂單中提供預設值。","screenshot":"工廠 1000 的「採購」頁籤，顯示採購群組欄位、訂購單位、採購價值碼以及收貨處理時間 / 允差欄位。","fields":[{"name":"採購群組","value":"001","note":"負責的採購人員；會預設帶入採購訂單"},{"name":"訂購單位","value":"EA","note":"若留空則預設為基本計量單位"},{"name":"採購價值碼","value":"1","note":"控制催詢天數、允差、運送指示"}],"tip":"稍後為該供應商維護採購資訊記錄或供貨來源清單，可讓系統建議預設的供應來源。"},{"title":"維護會計 / 評估資料","body":"在 **會計 1** 視圖 (評估範圍 1000) 上，輸入 **評估類別**、**價格控制** 指標以及對應的 **移動平均價** 或 **標準價格**。這些值是必填的，因為它們會驅動物料移動與發票驗證期間的總帳科目過帳。","screenshot":"評估範圍 1000 的「會計 1」頁籤，顯示評估類別、價格控制 (V/S) 以及移動平均價 / 標準價格欄位。","fields":[{"name":"評估類別","value":"3100 (交易商品)","note":"必須為該物料類型所允許；透過科目決定連結至總帳科目"},{"name":"價格控制","value":"V (移動平均價)","note":"交易商品請使用 V；S (標準) 常用於製成品/半成品"},{"name":"移動平均價","value":"10.00","note":"以公司代碼 1000 幣別表示的評估價格"}],"tip":"評估類別與價格控制必須與物料類型的科目決定一致，否則儲存將被阻擋。"},{"title":"檢查並儲存物料","body":"檢視所有已維護的視圖，然後點選 **儲存** (`Ctrl+S`) 或磁碟圖示。系統會跨視圖執行一致性檢查；修正任何錯誤訊息後，再儲存以提交記錄。","screenshot":"基本資料視圖，工具列中的儲存 (磁碟) 圖示反白，下方的狀態列準備顯示確認訊息。","fields":[],"tip":"儲存前請處理所有紅色錯誤訊息；黃色警告通常可用 Enter 確認，但仍應加以檢視。"}],"outcome":"儲存後，狀態列會顯示成功訊息「物料 100000 已建立」(訊息 M3 800；實際號碼依物料類型的內部或外部號碼範圍指派)。物料主檔現已存在並含所選視圖，可在採購申請、採購訂單與物料移動中被參考。"},{"code":"MM02","name":"變更物料記錄","group":"主資料","summary":"MM02 用於變更既有的物料主檔記錄。您輸入物料號碼，選擇所需的視圖與組織層次，編輯相關欄位後儲存。每次儲存都會產生一份物料變更憑證，記錄該欄位、舊值、新值、使用者與日期，日後可透過 MM04 (顯示物料變更憑證) 檢視。","menuPath":"後勤 > 物料管理 > 物料主檔 > 物料 > 變更 > 立即","prerequisites":["欲變更的物料已存在 (例如物料 100000，物料類型 HAWA「交易商品」，先前已透過 MM01 建立)。","您的使用者有權變更相關視圖與工廠 1000 的物料主檔資料。","您已知道物料號碼，以及哪些視圖/欄位需要變更。"],"steps":[{"title":"開啟 MM02 並輸入物料號碼","body":"從 SAP Easy Access 功能表執行交易 `MM02` (或依循功能表路徑)。在 **變更物料 (起始畫面)** 上，輸入您要變更的 **物料** 號碼並按 `Enter`。","screenshot":"MM02 起始畫面「變更物料 (起始畫面)」，顯示已輸入 100000 的物料輸入欄位。","fields":[{"name":"物料","value":"100000","note":"欲變更的既有記錄之物料號碼"}],"tip":"若不知道號碼，可在物料欄位使用搜尋說明 (F4) 依說明查找。"},{"title":"選擇要變更的視圖","body":"在 **選擇視圖** 對話框中，僅勾選包含您打算編輯之欄位的視圖 (例如 `基本資料 1`、`採購`，或 `物料需求規劃(MRP) 1`)。以 `Enter` 或 `繼續` (綠色勾選) 按鈕確認。","screenshot":"「選擇視圖」對話框，已選取基本資料 1 與採購列。","fields":[{"name":"視圖","value":"基本資料 1, 採購","note":"僅選擇您需要變更的視圖"}],"tip":"若希望此對話框每次都出現，請保持「僅依需求顯示視圖選擇」核取方塊未勾選；勾選則會抑制它並沿用您上次的選擇。"},{"title":"輸入組織層次","body":"在 **組織層次** 對話框中，輸入 **工廠** (若已選取相關視圖，則一併輸入 **儲存地點** / **採購組織**)，以便系統載入正確的組織特定資料。以 `Enter` 確認。","screenshot":"「組織層次」對話框，已填入工廠 1000、儲存地點 0001 與採購組織 1000。","fields":[{"name":"工廠","value":"1000","note":"工廠層級視圖 (採購、物料需求規劃(MRP) 等) 所需"},{"name":"儲存地點","value":"0001","note":"僅儲存地點相關視圖才需要"},{"name":"採購組織","value":"1000","note":"僅選取採購視圖時才需要"}],"tip":"只有與您所選視圖相關的組織層次才是必填的；其餘保持空白即可。"},{"title":"編輯所需欄位","body":"在資料畫面上變更需要更新的欄位，例如 **基本資料 1** 上的物料說明，或採購視圖上的 **採購群組**。使用頂端的頁籤在所選視圖之間切換。","screenshot":"基本資料 1 頁籤，物料說明欄位反白並已輸入更新後的值。","fields":[{"name":"物料說明","value":"Trading Good T-Shirt (Premium)","note":"基本資料 1 上的編輯範例"},{"name":"採購群組","value":"001","note":"採購視圖上的編輯範例"}],"tip":"物料類型與行業別於建立時設定，無法在 MM02 中變更。"},{"title":"儲存變更","body":"點選 `儲存` (或按 `Ctrl+S`) 以提交變更。系統會更新物料主檔並自動產生一份物料變更憑證。","screenshot":"工具列上的儲存按鈕，狀態列即將確認此變更。","fields":[],"tip":"若要在提交前捨棄您的編輯，請按 `返回` (F3)，並在 SAP 詢問是否儲存變更時回答否。"}],"outcome":"狀態列以類似「物料 100000 已變更」的訊息確認此變更。更新後的值會儲存於物料主檔中，且 SAP 會記錄一份物料變更憑證，擷取每個變更欄位的舊值、新值、進行變更的使用者以及日期/時間。這些變更日後可透過交易 MM04 (顯示物料變更憑證) 檢視，該交易僅供顯示且不會修改資料。"},{"code":"MM03","name":"顯示物料記錄","group":"主資料","summary":"MM03 以唯讀模式顯示既有的物料主檔記錄。您輸入物料號碼、選擇要檢視的視圖與組織層次，系統即顯示資料；無法編輯或儲存任何內容。這是查閱主資料且不會有變更風險的安全方式。","menuPath":"後勤 > 物料管理 > 物料主檔 > 物料 > 顯示 > 顯示現用","prerequisites":["物料 100000（「Trading Good T-Shirt」）已存在於物料主檔中（透過 MM01 建立）。","具有交易 MM03 以及相關物料類型/工廠的顯示權限。","您知道物料號碼，或可透過物料欄位上的匹配碼（F4）進行搜尋。"],"steps":[{"title":"開啟 MM03 並輸入物料","body":"啟動交易 `MM03`（或依循功能表路徑）。在起始畫面的**物料**欄位中輸入物料號碼。按 `Enter` 確認。","screenshot":"MM03 起始的「顯示物料」畫面，顯示物料欄位已填入 100000，視圖選擇對話框尚未出現之前。","fields":[{"name":"物料","value":"100000","note":"既有物料；若不知道號碼，可使用 F4 匹配碼搜尋。"}],"tip":"若您剛剛顯示過此物料，MM03 可能會預設帶出該物料；若要顯示其他物料，請清除該欄位。"},{"title":"選擇要檢視的視圖","body":"在**選擇視圖**對話框中，勾選您要讀取的視圖，例如 `基本資料 1`、`採購`、`銷售: 銷售組織資料 1`、`會計 1`。以 `Enter`（綠色勾選）確認。您可勾選 `選擇視圖` 僅在需要時顯示，以便下次略過此對話框。","screenshot":"「選擇視圖」對話框，列出所有已維護的視圖，其中基本資料 1、採購、銷售: 銷售組織資料 1 與會計 1 的核取方塊已選取。","fields":[{"name":"視圖","value":"基本資料 1; 採購; 銷售: 銷售組織資料 1; 會計 1","note":"只有此物料已建立的視圖才能顯示。"}],"tip":"只有實際為該物料維護過的視圖才會顯示資料；其他視圖會呈灰色或不顯示任何內容。"},{"title":"輸入組織層次","body":"在**組織層次**對話框中，輸入您所選視圖的關鍵碼，例如**工廠** `1000`、**儲存地點** `0001`、**銷售組織** `1000` 以及**配銷通路** `10`。以 `Enter` 確認。","screenshot":"「組織層次」對話框，已輸入工廠 1000、儲存地點 0001、銷售組織 1000 與配銷通路 10。","fields":[{"name":"工廠","value":"1000","note":"採購/物料需求規劃(MRP) 等工廠特定視圖所需。"},{"name":"儲存地點","value":"0001","note":"僅儲存地點層級的視圖才需要。"},{"name":"銷售組織","value":"1000","note":"選取了銷售視圖時所需。"},{"name":"配銷通路","value":"10","note":"銷售: 銷售組織資料 1 視圖亦需要；銷售組織 + 配銷通路共同構成銷售資料的關鍵碼。"}],"tip":"會計視圖的公司代碼 1000 是由工廠推導而來；通常您不需要在此直接輸入。"},{"title":"在各視圖頁籤中檢視資料","body":"物料以所選視圖作為頁籤顯示。檢視諸如**物料說明**（「Trading Good T-Shirt」）、**基本計量單位**、**物料群組** 以及採購/銷售/會計資料等欄位。所有欄位皆為唯讀，無法變更。","screenshot":"MM03 顯示畫面，呈現基本資料 1 頁籤，說明為「Trading Good T-Shirt」，欄位皆呈灰色（不可編輯）。","fields":[{"name":"物料說明","value":"Trading Good T-Shirt","note":"僅供顯示；該欄位呈灰色。"},{"name":"基本計量單位","value":"PC","note":"唯讀範例值。"}],"tip":"點選頁籤（或使用「附加資料」）在各視圖之間切換；由於無法變更任何內容，因此沒有儲存按鈕。"}],"outcome":"物料 100000 的所選視圖會以唯讀模式分別顯示於其對應的頁籤中。所有欄位皆呈灰色且無儲存動作，因此物料主檔維持不變。您可使用綠色返回箭頭或 `F3` 離開；系統只會回到起始畫面，不會建立任何憑證。"},{"code":"MM04","name":"顯示物料變更憑證","group":"主資料","summary":"MM04 顯示現有物料主檔記錄的變更憑證。它依可選取的範圍（例如基本資料、銷售、採購等）列出已進行的變更，顯示變更的欄位及其舊值與新值，並附上進行變更的使用者以及變更日期/時間。這是一個唯讀的報表交易，不會變更任何資料；它呈現由 MM02 中儲存動作所產生的稽核軌跡。","menuPath":"後勤 > 物料管理 > 物料主檔 > 物料 > 顯示變更 > 作用中變更","prerequisites":["物料主檔記錄（例如物料 100000）已存在，且係透過 MM01 建立。","已透過 MM02 對該物料儲存至少一次變更，因此存在可供顯示的變更憑證。","使用者具備該物料主檔的相關顯示權限（授權物件 M_MATE_STA 及相關物件）。"],"steps":[{"title":"開啟交易 MM04","body":"在命令欄位輸入 `MM04` 並按 `Enter`，或依循功能表路徑 **SAP 功能表 > 後勤 > 物料管理 > 物料主檔 > 物料 > 顯示變更 > 作用中變更**。會出現 *顯示變更 (作用中變更): 起始畫面*。","screenshot":"SAP Easy Access 畫面，命令欄位中輸入了 MM04，以及隨後顯示的「顯示變更」起始畫面抬頭。","fields":[{"name":"交易代碼","value":"MM04","note":"在左上角的命令欄位中輸入。"}],"tip":"MM04 為唯讀；它絕不會變更資料，因此在正式環境的物料主檔上執行也很安全。"},{"title":"輸入物料與選擇條件","body":"在 **物料** 欄位中輸入 `100000`。可選擇性地使用 **變更起始日** （及對應的日期/時間欄位）來限制期間；保留預設值即可檢視完整的變更歷程。","screenshot":"起始畫面，顯示已輸入物料 100000，且變更期間選擇欄位維持其預設值。","fields":[{"name":"物料","value":"100000","note":"您想檢視其變更歷程的現有物料。"},{"name":"變更起始日","value":"(預設)","note":"選擇性；將變更限制為在此日期/時間當日或之後所進行者。"}],"tip":"第一次先保留期間的預設值，以確認變更確實存在後，再縮小期間範圍。"},{"title":"執行以列出變更憑證","body":"按 `Enter` 或點選 `執行` （`F8`）。系統會顯示變更憑證，依變更號碼/日期分組，列出每個變更的欄位及其 **舊值** （舊內容）與 **新值** （新內容），並附上進行變更的 **使用者** 以及變更 **日期/時間**。","screenshot":"變更憑證概覽清單，顯示變更的欄位及其舊內容、新內容、使用者，以及變更日期/時間。","fields":[],"tip":"若清單為空，表示該物料在所選期間內尚無變更憑證存在 - 請確認已在 MM02 中執行過儲存。"},{"title":"詳細檢視變更","body":"捲動瀏覽清單（或定位於某個變更區塊）以檢視每個變更欄位的完整前/後值。使用 `返回` （`F3`）回到起始畫面。","screenshot":"變更憑證清單，顯示每個被修改的欄位及其舊內容與新內容，並附上使用者與時間戳記。","fields":[],"tip":"清單中顯示的欄位說明，有助於在稽核查詢時追蹤某項變更。"}],"outcome":"系統會顯示物料 100000 的變更憑證稽核軌跡：變更的欄位及其舊值與新值、進行每項變更的使用者，以及變更日期與時間。不會建立或變更任何資料 - MM04 僅報告由先前 MM02 儲存所產生的歷程。"},{"code":"ME51N","name":"建立採購申請","group":"採購","summary":"提出一筆內部採購申請（在採購訂單之前先發出的需求訊號），以在採購到付款 (P2P) 循環中為特定工廠採購某項物料。","menuPath":"後勤 > 物料管理 > 採購 > 採購申請 > 建立","prerequisites":["物料主檔記錄 100000（「Trading Good T-Shirt」）已存在於工廠 1000，且已維護採購視圖。","組織主資料已設定：工廠 1000、儲存地點 0001、採購群組 001（以及供後續採購訂單使用的採購組織 1000）。","使用者具備 ME51N 及相關憑證類型的權限（授權物件 M_BANF_BSA）。"],"steps":[{"title":"開啟交易並設定憑證類型","body":"在命令欄位輸入交易碼 `ME51N`（或使用功能表路徑）並按 `Enter`。在畫面上方，從憑證類型欄位旁的下拉清單選擇憑證類型 `NB`。","screenshot":"ME51N「建立採購申請」起始畫面，上方的憑證類型下拉清單設為 NB，下方為抬頭、項目概覽與項目明細區域。","fields":[{"name":"憑證類型","value":"NB 標準採購申請","note":"NB = 標準採購申請；大多數內部需求的預設值。"}],"tip":"若抬頭／項目概覽／項目明細區域處於摺疊狀態，請點選各區段列上的小三角形（展開圖示）將其展開。"},{"title":"在項目概覽中輸入物料與數量","body":"在**項目概覽**表格中，輸入**物料** `100000` 與所申請的**數量** `10`。按 `Enter`，系統會從物料主檔帶出簡短文字「Trading Good T-Shirt」、基本**單位**（例如 `PC`）以及物料群組。","screenshot":"項目概覽格線中行項目 10 已填入：物料 100000、簡短文字「Trading Good T-Shirt」、數量 10、單位 PC，且物料群組自動填入。","fields":[{"name":"物料","value":"100000","note":"Trading Good T-Shirt；簡短文字與物料群組由主檔預設帶出。"},{"name":"申請數量","value":"10","note":"以基本計量單位表示的申請數量。"},{"name":"單位","value":"PC","note":"由物料主檔預設帶出；若存在替代計量單位可變更。"}],"tip":"對於庫存物料，請將簡短文字留空，系統會自動填入。對於自由文字（無物料號碼）的項目，您必須手動輸入說明與物料群組。"},{"title":"輸入交貨日期、工廠、儲存地點與採購群組","body":"在項目概覽的同一個項目行中，輸入**交貨日期**（例如 `06/30/2026`）、**工廠** `1000`、**儲存地點** `0001`，並確認**採購群組** `001`（可能由物料主檔預設帶出）。按 `Enter` 進行驗證。","screenshot":"項目概覽行顯示項目 10 的交貨日期 06/30/2026、工廠 1000、儲存地點 0001 與採購群組 001，狀態列無任何錯誤訊息。","fields":[{"name":"交貨日期","value":"06/30/2026","note":"所需數量的需求日期；驅動物料需求規劃(MRP) 與採購訂單排程。"},{"name":"工廠","value":"1000","note":"提出需求的收貨工廠。"},{"name":"儲存地點","value":"0001","note":"選填；目標庫存地點。"},{"name":"採購群組","value":"001","note":"負責的採購人員／群組；為必填欄位，於項目概覽中維護。"}],"tip":"請使交貨日期相對於計畫交貨時間保持合理，否則系統可能會警告該日期無法達成。"},{"title":"維護項目明細（供應來源／科目分配）","body":"選取該行項目並開啟**項目明細**區段。在**供應來源**頁籤上，可選擇性地輸入**期望供應商** `1000` 與**採購組織** `1000`，作為給採購人員的供應來源提示。視需要使用**數量/日期**與**評估**頁籤來檢視排程與定價。","screenshot":"項目 10 的項目明細區域顯示各頁籤（物料資料、數量/日期、評估、供應來源、科目分配、文字）；供應來源頁籤已開啟，並輸入期望供應商 1000 與採購組織 1000。","fields":[{"name":"期望供應商","value":"1000","note":"選填的供應來源建議，位於供應來源頁籤上。"},{"name":"採購組織","value":"1000","note":"在採購申請階段為選填；當採購人員建立採購訂單時為必填。"}],"tip":"對於非庫存或成本中心需求，請在項目行上設定科目分配類別（例如 `K` 成本中心）並完成科目分配頁籤，否則該行無法儲存。"},{"title":"檢查採購申請","body":"點選**檢查**按鈕（或功能表 **編輯 > 檢查**）以驗證所有輸入。檢視底部的訊息區域並解決任何錯誤（紅色）訊息；警告（黃色）訊息可以確認接受。","screenshot":"ME51N 底部的訊息區域，在檢查功能成功執行後顯示綠色的「檢查期間未發出任何訊息」結果。","fields":[],"tip":"在多項目的採購申請上，請務必先執行檢查再儲存，它會在憑證提交前揭露缺漏的科目分配或供應來源錯誤。"},{"title":"儲存採購申請","body":"點選**儲存**按鈕（或按 `Ctrl+S`）以過帳採購申請。系統會提交憑證並返回建立畫面，準備進行下一筆輸入。","screenshot":"SAP 視窗底部的狀態列顯示綠色的成功訊息「採購申請號碼 0010000042 已建立」。","fields":[],"tip":"請記下狀態列中的採購申請號碼，您需要用它來追蹤釋放(核准)狀態（ME54N/ME55），並在採購訂單轉換期間（ME21N/ME57/ME58）找到該憑證。"}],"outcome":"儲存後，狀態列會顯示成功訊息「採購申請號碼 10000XXXX 已建立」（例如「採購申請號碼 0010000042 已建立」）。該採購申請會被儲存，且依配置而定，可能在轉換為採購訂單之前須先經過釋放(核准)策略。"},{"code":"ME21N","name":"建立採購訂單","group":"採購","summary":"建立一張正式的採購訂單給供應商以採購物料，並可選擇參考既有的採購申請，作為採購到付款 (P2P) 流程的一環。","menuPath":"後勤 > 物料管理 > 採購 > 採購訂單 > 建立 > ME21N - 已知供應商/供應工廠","prerequisites":["已維護供應商主檔記錄 (例如供應商 1000)，對應採購組織 1000 與公司代碼 1000 (XK01/MK01)","物料主檔記錄 (例如物料 100000「Trading Good T-Shirt」) 已存在於工廠 1000 並具備採購視圖","具備交易 ME21N 與採購組織 1000 的授權 (物件 M_BEST_BSA / M_BEST_EKO)；若要參考採購申請，採購申請為選用項目"],"steps":[{"title":"開啟 ME21N 並選擇憑證類型","body":"在命令欄位輸入交易代碼 `ME21N`，或依循功能表路徑。在左上方，使用憑證號碼區域旁的憑證類型下拉清單，將憑證類型設為 `NB` (**標準採購訂單**)。","screenshot":"ME21N 起始畫面顯示三個可摺疊區域 (抬頭、項目概覽、項目明細)，左上方的憑證類型下拉清單設為「標準採購訂單」。","fields":[{"name":"憑證類型","value":"NB 標準採購訂單","note":"NB 為標準採購訂單類型"}],"tip":"若前一位使用者的資料已預先填入，請使用憑證類型下拉清單確認您正在建立 NB 標準採購訂單。"},{"title":"輸入供應商與抬頭資料","body":"在抬頭行輸入**供應商**號碼。開啟抬頭區段中的**組織資料**頁籤，並輸入**採購組織**、**採購群組**與**公司代碼**。按 `Enter` 讓系統帶出供應商的地址與條件。","screenshot":"展開的抬頭區域，供應商欄位已填入，且「組織資料」頁籤顯示已填妥的採購組織、採購群組與公司代碼欄位。","fields":[{"name":"供應商","value":"1000","note":"採購訂單所開立的對象供應商 (在 ECC 中標示為「供應商」)"},{"name":"採購組織","value":"1000","note":"組織資料頁籤"},{"name":"採購群組","value":"001","note":"組織資料頁籤"},{"name":"公司代碼","value":"1000","note":"組織資料頁籤；通常由採購組織/工廠推導而得"}],"tip":"若抬頭頁籤未顯示，請按一下抬頭展開圖示開啟抬頭區段。"},{"title":"輸入採購訂單行項目","body":"在**項目概覽**表格中，於第一個項目行 (項目 10) 輸入**物料**、**採購訂單數量**、**交貨日期**與**工廠**。如組態需要，可選擇性輸入**儲存地點**。按 `Enter` 讓系統由物料主檔與資訊記錄帶出**淨價**、**訂購單位**與**物料群組**。","screenshot":"項目概覽表格中項目 10 已填妥：物料 100000「Trading Good T-Shirt」、數量、交貨日期與工廠 1000，價格與單位已帶出。","fields":[{"name":"物料","value":"100000","note":"Trading Good T-Shirt"},{"name":"採購訂單數量","value":"100","note":"訂購數量"},{"name":"交貨日期","value":"30.06.2026","note":"要求的交貨日期"},{"name":"工廠","value":"1000","note":"收貨工廠"},{"name":"儲存地點","value":"0001","note":"採購訂單上為選用；可於收貨時帶入預設值"}],"tip":"若要參考採購申請而非手動鍵入項目，請開啟憑證概覽 (左窗格)，選取該採購申請，並使用採用 (或拖放) 來複製其項目。"},{"title":"維護項目明細資料","body":"選取該行並檢視**項目明細**區段。在 *條件* 頁籤確認**淨價**，在 *發票* 頁籤確認**稅碼**，若該項目非用於庫存 (科目分配類別)，則在 *科目分配* 頁籤確認**總帳科目**/科目分配。","screenshot":"項目 10 的項目明細區段顯示條件、發票與科目分配頁籤，淨價與稅碼可見。","fields":[{"name":"淨價","value":"9.50 EUR","note":"條件頁籤；帶出預設值或自行輸入"},{"name":"稅碼","value":"V0","note":"發票頁籤"}],"tip":"對於標準庫存物料無需科目分配；將科目分配類別保留空白。"},{"title":"檢查採購訂單","body":"按一下**檢查**按鈕 (或功能表 *採購訂單 > 檢查*) 以驗證憑證。在儲存前，解決狀態列或訊息記錄中顯示的任何錯誤或警告訊息。","screenshot":"採購訂單已執行檢查，訊息區域/記錄顯示「未發出任何訊息」或列出需解決的任何警告。","fields":[],"tip":"黃色警告仍可讓您儲存；紅色錯誤則必須先清除。"},{"title":"儲存採購訂單","body":"按一下**儲存** (磁碟圖示) 或按 `Ctrl+S` 以過帳採購訂單。系統會指派憑證號碼，採購訂單即建立完成。","screenshot":"畫面底部的狀態列顯示綠色成功訊息，含新建立的採購訂單號碼。","fields":[],"tip":"請記下狀態列中的採購訂單號碼；您將需要它來進行收貨 (MIGO) 與發票驗證 (MIRO)。"}],"outcome":"狀態列顯示綠色成功訊息，例如「標準採購訂單已建立，號碼為 4500017xxx」，確認採購訂單已儲存並指派憑證號碼。該採購訂單現在可用於輸出 (列印/EDI)、收貨 (MIGO) 與發票驗證 (MIRO)，作為採購到付款 (P2P) 流程的一環。"},{"code":"MIGO","name":"依採購訂單過帳收貨","group":"庫存管理","summary":"依採購訂單過帳收貨，使用移動類型 101 將訂購的貨品收入倉庫庫存。","menuPath":"後勤 > 物料管理 > 庫存管理 > 物料移動 > MIGO - 物料移動","prerequisites":["已存在一張已釋放的採購訂單（例如在 ME21N 中建立），對象為物料 100000、工廠 1000、供應商 1000，且有未結交貨數量","物料主檔 100000「Trading Good T-Shirt」已針對工廠 1000 與儲存地點 0001 維護（會計及儲存/工廠資料視圖）","使用者具有物料移動的權限（移動類型使用授權物件 M_MSEG_BWA，工廠使用 M_MSEG_WMB），於公司代碼 1000 / 工廠 1000"],"steps":[{"title":"開啟 MIGO 並選擇動作","body":"在命令欄位輸入交易碼 `MIGO`，或依功能表路徑操作。在頂端的兩個動作下拉清單中，選擇 `A01 收貨` 並參考 `R01 採購訂單`。採購訂單收貨的預設移動類型為 `101`。","screenshot":"MIGO 起始畫面顯示頂端的動作列，可執行動作設為「收貨」，參考憑證設為「採購訂單」，採購訂單號碼欄位，以及右側顯示的移動類型 101。","fields":[{"name":"可執行動作","value":"A01 收貨","note":"動作列中的左側下拉清單"},{"name":"參考憑證","value":"R01 採購訂單","note":"動作旁的中間下拉清單"},{"name":"移動類型","value":"101","note":"採購訂單收貨時自動帶入預設值"}],"tip":"MIGO 會記住每位使用者上次的動作/參考組合，因此在輸入採購訂單號碼前請先確認兩個下拉清單。"},{"title":"輸入採購訂單號碼","body":"在參考憑證旁的欄位輸入**採購訂單**號碼（例如 `4500000123`），然後按 `Enter`（或點選 `執行`）。系統會讀取採購訂單並以未結項目填入項目表，包含供應商 `1000`、工廠 `1000` 與物料 `100000`。","screenshot":"讀取採購訂單後的 MIGO 畫面：底部的項目概覽表已填入物料 100000「Trading Good T-Shirt」、未結數量、工廠 1000，以及來自採購訂單的收貨建議。","fields":[{"name":"採購訂單","value":"4500000123","note":"具有未結交貨數量的已釋放採購訂單"}],"tip":"將採購訂單項目欄位留空可帶入所有未結項目；只有當您想收貨單一行項目時，才輸入特定的項目號碼。"},{"title":"檢查抬頭資料與憑證日期","body":"在**抬頭**區域的**一般**頁籤上，檢視**憑證日期**與**過帳日期**（預設為今天，例如 `20.06.2026`）。可選擇性地在**交貨單**與**提貨單**欄位中輸入裝箱單上的供應商參考。","screenshot":"MIGO 抬頭頁籤已展開，顯示一般頁籤中的憑證日期與過帳日期欄位，以及由供應商裝箱單填入的交貨單 / 提貨單登錄欄位。","fields":[{"name":"過帳日期","value":"20.06.2026","note":"決定庫存與財務過帳的期間"},{"name":"憑證日期","value":"20.06.2026","note":"供應商交貨單上的日期"},{"name":"交貨單","value":"LS-2026-0457","note":"供應商的交貨單號碼（選填參考）"}],"tip":"過帳日期決定庫存與會計憑證落入的期間 - 若要過帳到前一天請刻意變更它，並確保該期間為開啟狀態。"},{"title":"逐項目核對數量、儲存地點與庫存類型","body":"在項目概覽中選取每一行，並在**數量**頁籤上核對**登錄單位數量**與實際到貨數量；部分收貨時可覆寫它。在**位置**頁籤上確認**工廠** `1000`、**儲存地點** `0001`，以及**庫存類型**為`未限制使用`。","screenshot":"項目明細區域，數量頁籤顯示登錄單位 100 PC，位置頁籤顯示工廠 1000、儲存地點 0001、移動類型 101 與庫存類型未限制使用。","fields":[{"name":"登錄單位數量","value":"100","note":"實際收到的數量（PC）"},{"name":"儲存地點","value":"0001","note":"工廠 1000 中的收貨儲存地點"},{"name":"庫存類型","value":"未限制使用","note":"若流程需要，使用品質檢驗或凍結"}],"tip":"若為部分交貨，請減少數量而非刪除該行；採購訂單對剩餘數量仍保持未結。"},{"title":"設定 OK 指示器並檢查憑證","body":"為每一行您要過帳的項目勾選**項目 OK** 核取方塊（或使用**全選**）。點選 `檢查` 讓系統驗證憑證；綠色狀態確認其已可過帳（「憑證正確」）。","screenshot":"項目概覽中物料 100000 那一行的項目 OK 核取方塊已勾選，畫面底部顯示綠色檢查狀態訊息「憑證正確」。","fields":[{"name":"項目 OK","value":"已勾選","note":"只有已勾選的項目才會過帳"}],"tip":"若檢查回傳黃色或紅色狀態，雙擊該訊息以跳至需要修正的欄位，然後再過帳。"},{"title":"過帳收貨","body":"點選 `過帳`（Ctrl+S / 儲存）。系統會建立物料憑證與對應的會計憑證，並清除畫面以供下一筆登錄。","screenshot":"MIGO 畫面底部的狀態列在儲存後顯示綠色成功訊息「物料憑證 5000000123 已過帳」。","fields":[],"tip":"請記下訊息中的物料憑證號碼 - 您將需要它來進行任何後續的取消（移動類型 102）或在 MIRO 中比對供應商發票。"}],"outcome":"過帳後，狀態列顯示成功訊息，例如 `物料憑證 5000000123 已過帳`。系統會建立一張物料憑證（移動類型 101）與一張會計憑證，物料 100000 於工廠 1000 / 儲存地點 0001 的未限制使用庫存增加，且採購訂單歷史以此收貨更新。"},{"code":"MIRO","name":"輸入進項發票","group":"發票驗證","summary":"依採購訂單與收貨核對並過帳供應商發票，執行三方比對以結束採購到付款 (P2P) 循環。","menuPath":"後勤 > 物料管理 > 後勤發票驗證 > 憑證輸入 > 輸入發票","prerequisites":["供應商 1000 已存在一張已釋放的採購訂單 (例如在 ME21N 中建立)，且至少有一個物料 100000 的行項目。","已針對該採購訂單過帳收貨 (MIGO，移動類型 101)，因此存在可供三方比對的收貨/發票結算分錄。","已維護供應商主檔 (1000) 及使用者的過帳權限 (公司代碼 1000 的權限物件 F_BKPF_BUK)。"],"steps":[{"title":"開啟 MIRO 並設定公司代碼","body":"在命令欄位輸入交易代碼 `MIRO` 或使用功能表路徑。若出現**輸入公司代碼**對話框，輸入 `1000` 並按 `Enter`。輸入進項發票畫面會以開立發票的公司代碼開啟。","screenshot":"初始 MIRO 畫面，並有小型的輸入公司代碼對話框，顯示欄位 公司代碼 = 1000 與綠色勾選 (繼續) 按鈕。","fields":[{"name":"公司代碼","value":"1000","note":"每個工作階段僅於首次輸入時出現；設定過帳公司代碼。"}],"tip":"公司代碼每個工作階段只會提示一次。之後可使用功能表 編輯 > 切換公司代碼 來變更。"},{"title":"選擇交易並輸入抬頭資料","body":"在畫面抬頭頂端 (頁籤列上方) 的**交易**下拉清單中，選擇 `發票`。接著在**基本資料**頁籤輸入供應商憑證上的**發票日期**、**過帳日期** (預設為今天)、毛額**金額**、憑證**幣別**，以及在**參考**中輸入供應商的發票號碼。","screenshot":"MIRO 抬頭顯示頁籤列上方的 交易 欄位設為 發票，基本資料 頁籤為作用中，且 發票日期、過帳日期、金額、幣別 與 參考 欄位已填入。","fields":[{"name":"交易","value":"發票","note":"畫面抬頭 (頁籤上方) 的下拉清單；用以選擇發票或貸項憑單 / 後續借記 / 後續貸記。"},{"name":"發票日期","value":"20.06.2026","note":"供應商發票上印製的日期。"},{"name":"過帳日期","value":"20.06.2026","note":"決定過帳期間；預設為現用日期。"},{"name":"金額","value":"1.190,00","note":"含稅的毛額發票金額。"},{"name":"幣別","value":"EUR","note":"來自供應商發票的憑證幣別。"},{"name":"參考","value":"VINV-2026-0815","note":"供應商的發票號碼；以 XBLNR 儲存以供參考。"}],"tip":"在基本資料頁籤設定計算稅額指示碼並選擇正確的稅碼 (例如 V1)，讓系統由淨值推算稅額。"},{"title":"參照採購訂單","body":"在分配區域 (下方區段)，將參考類別下拉清單設為 `採購訂單/排程協議` 並輸入採購訂單號碼 `4500000123`。按 `Enter`，讓系統帶入待開發票的未結採購訂單/收貨項目。","screenshot":"採購訂單參考下拉清單設為 採購訂單/排程協議，並輸入採購訂單號碼 4500000123，下方的項目表格帶入物料 100000 的第 10 行項目。","fields":[{"name":"參考類別","value":"採購訂單/排程協議","note":"告知 MIRO 由採購訂單擷取項目。"},{"name":"採購訂單號碼","value":"4500000123","note":"供應商 1000 的已釋放採購訂單；建議帶入項目、數量與金額。"}],"tip":"若採購訂單含運費，將版面配置設為「物料/服務項目 + 計畫交貨成本」，使交貨成本顯示為獨立行項目。"},{"title":"檢查建議項目與三方比對","body":"在項目表格中，檢視物料 `100000` (「Trading Good T-Shirt」) 的建議行：確認**金額**與**數量**符合收貨，且每一欲付款行的 **OK** 核取方塊均已勾選。僅在發票確實有差異時才調整數量或金額。","screenshot":"項目概覽表格顯示第 10 項，物料 100000 Trading Good T-Shirt，並有 金額、數量、採購訂單單位、稅碼以及已選取的 OK 指示碼。","fields":[{"name":"OK","value":"已選取","note":"核取方塊欄標題 OK；將該行標記為核准過帳。"},{"name":"金額","value":"1.000,00","note":"由採購訂單/收貨建議的淨額；若發票不同則編輯。"},{"name":"數量","value":"100","note":"開發票數量；與收貨數量進行比對。"},{"name":"稅碼","value":"V1","note":"進項稅碼；必須與抬頭輸入的毛額一致。"}],"tip":"價格或數量差異超出允差會觸發凍結原因 (例如 R)，發票即被凍結付款 — 它仍會過帳，但會保留待在 MRBR 中釋放。"},{"title":"確認餘額為零","body":"檢查右上角的**餘額**欄位。它必須顯示 `0,00` 並帶有綠色號誌燈圖示，表示抬頭金額等於各項目加稅額的總和。紅燈表示發票尚未平衡，無法過帳。","screenshot":"右上角狀態區顯示 餘額 欄位為 0,00，旁邊有綠色號誌燈圖示，表示憑證已可過帳。","fields":[],"tip":"若餘額非零，請在嘗試過帳前重新檢查抬頭的 金額、稅碼以及任何非計畫交貨成本。"},{"title":"模擬並過帳發票","body":"按 `模擬` 以預覽會計分錄 (供應商貸記、收貨/發票結算借記、進項稅)。當分錄看起來正確時，選擇 `過帳` (或 `Ctrl+S`) 以儲存發票憑證。","screenshot":"模擬憑證對話框列出 FI 分錄 — 貸記供應商科目、借記收貨/發票結算與進項稅 — 底部有過帳按鈕。","fields":[],"tip":"每次過帳前都要模擬；一旦過帳，錯誤的發票只能在 MR8M 中以沖銷更正，無法直接編輯。"}],"outcome":"系統過帳後勤發票，並在狀態列顯示成功訊息「憑證號碼 5105600123 已建立」；此會產生一筆後勤發票驗證憑證 (RBKP) 及對應的 FI 會計憑證，貸記供應商並結算收貨/發票結算科目，完成三方比對與 P2P 循環。"}]</script>

  <script>
    (function () {
      "use strict";
      var DATA = [];
      try { DATA = JSON.parse(document.getElementById("proc-data").textContent || "[]"); } catch (e) { DATA = []; }

      var sidebar = document.getElementById("sidebar");
      var content = document.getElementById("content");
      var backdrop = document.getElementById("backdrop");
      var active = 0;
      var stepIndex = 0;

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
      function md(t) {
        t = t || "";
        if (window.marked && typeof window.marked.parse === "function") return window.marked.parse(t);
        var h = esc(t).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/`(.+?)`/g, "<code>$1</code>");
        return "<p>" + h + "</p>";
      }
      function renderPath(path) {
        return String(path || "").split(">").map(function (s) {
          return '<span class="path-seg">' + esc(s.trim()) + "</span>";
        }).join('<span class="path-sep">›</span>');
      }

      function buildSidebar() {
        var groups = [];
        DATA.forEach(function (p, i) {
          var g = groups.filter(function (x) { return x.name === p.group; })[0];
          if (!g) { g = { name: p.group, items: [] }; groups.push(g); }
          g.items.push({ p: p, i: i });
        });
        var html = '<div class="px-2 pb-2 pt-1"><div class="text-[0.65rem] font-semibold uppercase tracking-wider opacity-45">操作流程</div></div>';
        html += '<ul class="menu w-full p-0 gap-0.5">';
        groups.forEach(function (g) {
          html += '<li class="menu-title px-2 pt-2 pb-1 text-[0.68rem] tracking-wide">' + esc(g.name) + "</li>";
          g.items.forEach(function (o) {
            html += '<li><a class="proc-link' + (o.i === active ? " active" : "") + '" data-i="' + o.i + '">' +
              '<span class="proc-name">' + esc(o.p.name) + "</span>" +
              '<span class="proc-code">' + esc(o.p.code) + "</span>" +
              "</a></li>";
          });
        });
        html += "</ul>";
        sidebar.innerHTML = html;
        sidebar.querySelectorAll(".proc-link").forEach(function (a) {
          a.addEventListener("click", function () { select(+a.dataset.i); });
        });
      }

      function renderShot(p, s, idx) {
        return '<figure class="shot">' +
          '<div class="shot-frame">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 15l-4.5-4.5L7 20"/></svg>' +
          '<div class="shot-label">參考螢幕截圖</div>' +
          '<div class="shot-tag">' + esc(p.code) + " · 步驟 " + (idx + 1) + "</div>" +
          "</div>" +
          '<figcaption><span class="fig-no">圖 ' + (idx + 1) + ".</span> " + esc(s.screenshot) + "</figcaption>" +
          "</figure>";
      }

      function renderStepCard(p, s, idx) {
        var h = '<div class="card bg-base-100 border border-base-300 shadow-sm"><div class="card-body p-4 sm:p-5 gap-3">';
        h += '<div class="flex items-center gap-3"><div class="step-num">' + (idx + 1) + "</div>" +
          '<h3 class="font-semibold text-base leading-tight">' + esc(s.title) + "</h3></div>";
        h += '<div class="md text-sm">' + md(s.body) + "</div>";
        if (s.fields && s.fields.length) {
          h += '<div class="overflow-x-auto"><table class="table table-sm field-table">' +
            "<thead><tr><th>欄位</th><th>範例輸入</th><th>說明</th></tr></thead><tbody>";
          s.fields.forEach(function (f) {
            h += "<tr><td class=\"font-medium\">" + esc(f.name) + "</td>" +
              '<td><code class="val">' + esc(f.value) + "</code></td>" +
              '<td class="opacity-70">' + esc(f.note) + "</td></tr>";
          });
          h += "</tbody></table></div>";
        }
        h += renderShot(p, s, idx);
        if (s.tip) h += '<div class="tip"><span class="tip-ico">💡</span><span>' + esc(s.tip) + "</span></div>";
        h += "</div></div>";
        return h;
      }

      function railHtml(p) {
        var h = '<div class="wiz-rail" role="tablist" aria-label="步驟">';
        p.steps.forEach(function (s, i) {
          var cls = i === stepIndex ? "current" : (i < stepIndex ? "done" : "todo");
          h += '<button class="wiz-dot ' + cls + '" data-s="' + i + '" title="' + esc((i + 1) + ". " + s.title) + '">' +
            (i < stepIndex ? "✓" : (i + 1)) + "</button>";
          if (i < p.steps.length - 1) h += '<span class="wiz-line ' + (i < stepIndex ? "done" : "") + '"></span>';
        });
        h += "</div>";
        return h;
      }

      function controlsHtml(p) {
        var Y = p.steps.length, last = stepIndex === Y - 1;
        var pct = Math.round(((stepIndex + 1) / Y) * 100);
        var nextLabel, nextDisabled = false;
        if (!last) nextLabel = "下一步 →";
        else if (active < DATA.length - 1) nextLabel = "下一個：" + esc(DATA[active + 1].code) + " →";
        else { nextLabel = "已完成 ✓"; nextDisabled = true; }
        return '<div class="wiz-controls">' +
          '<button class="btn btn-sm btn-ghost' + (stepIndex === 0 ? " btn-disabled" : "") + '" id="stepPrev">← 上一步</button>' +
          '<div class="wiz-progress"><div class="wiz-progress-bar" style="width:' + pct + '%"></div></div>' +
          '<span class="wiz-count">步驟 ' + (stepIndex + 1) + " / " + Y + "</span>" +
          '<button class="btn btn-sm btn-primary' + (nextDisabled ? " btn-disabled" : "") + '" id="stepNext">' + nextLabel + "</button>" +
          "</div>";
      }

      function outcomeHtml(p) {
        return '<div class="outcome mt-4"><span class="oc-icon">✓</span><div>' +
          '<div class="font-semibold text-sm">結果</div>' +
          '<div class="text-sm opacity-90 mt-0.5">' + esc(p.outcome) + "</div></div></div>";
      }

      function renderWizard() {
        var p = DATA[active];
        var Y = p.steps.length;
        if (stepIndex > Y - 1) stepIndex = Y - 1;
        if (stepIndex < 0) stepIndex = 0;
        var last = stepIndex === Y - 1;
        var w = document.getElementById("wizard");
        var h = railHtml(p) + renderStepCard(p, p.steps[stepIndex], stepIndex) + controlsHtml(p);
        if (last) h += outcomeHtml(p);
        w.innerHTML = h;

        w.querySelectorAll(".wiz-dot").forEach(function (d) {
          d.addEventListener("click", function () { setStep(+d.dataset.s); });
        });
        var sp = document.getElementById("stepPrev");
        if (sp && stepIndex > 0) sp.addEventListener("click", function () { setStep(stepIndex - 1); });
        var sn = document.getElementById("stepNext");
        if (sn) sn.addEventListener("click", function () {
          if (stepIndex < Y - 1) setStep(stepIndex + 1);
          else if (active < DATA.length - 1) select(active + 1);
        });
      }

      function render() {
        var p = DATA[active];
        if (!p) { content.innerHTML = '<div class="p-8 text-center opacity-60">未載入任何操作流程資料。</div>'; return; }
        var h = "";
        h += '<div class="breadcrumbs text-sm opacity-70 py-0"><ul>' +
          "<li>SAP</li><li>物料管理</li><li>" + esc(p.group) + '</li><li class="text-prim font-medium">' + esc(p.code) + "</li></ul></div>";
        h += '<div class="flex flex-wrap items-center gap-2.5 mt-1">' +
          '<h1 class="text-2xl font-bold leading-tight">' + esc(p.name) + "</h1>" +
          '<span class="badge badge-primary badge-lg font-mono">' + esc(p.code) + "</span>" +
          '<span class="badge badge-sm verified-badge">✓ 已驗證</span></div>';
        h += '<p class="opacity-80 mt-2 max-w-3xl text-[0.95rem]">' + esc(p.summary) + "</p>";

        h += '<div class="card bg-base-100 border border-base-300 shadow-sm mt-4"><div class="card-body p-4 gap-2">' +
          '<div class="flex flex-wrap items-center gap-2">' +
          '<span class="text-[0.68rem] font-semibold uppercase tracking-wider opacity-50">交易碼</span>' +
          '<span class="font-mono text-sm text-prim font-semibold">' + esc(p.code) + "</span></div>" +
          '<div class="menu-path">' + renderPath(p.menuPath) + "</div></div></div>";

        h += '<div class="collapse collapse-arrow border border-base-300 bg-base-100 rounded-box mt-3">' +
          '<input type="checkbox" />' +
          '<div class="collapse-title text-sm font-medium">先決條件 <span class="opacity-50">(' + p.prerequisites.length + ")</span></div>" +
          '<div class="collapse-content"><ul class="prereq pb-2">' +
          p.prerequisites.map(function (x) { return "<li>" + esc(x) + "</li>"; }).join("") + "</ul></div></div>";

        h += '<div class="flex items-center gap-2 mt-7 mb-3">' +
          '<h2 class="text-lg font-bold">逐步操作</h2>' +
          '<span class="badge badge-ghost badge-sm">' + p.steps.length + " 個步驟</span></div>";
        h += '<div id="wizard"></div>';

        content.innerHTML = h;
        renderWizard();
      }

      function closeSidebar() { sidebar.classList.remove("open"); backdrop.classList.remove("show"); }

      function setStep(i) {
        var p = DATA[active];
        if (i < 0 || i > p.steps.length - 1) return;
        stepIndex = i;
        renderWizard();
        var w = document.getElementById("wizard");
        if (w) w.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function select(i) {
        if (i < 0 || i >= DATA.length) return;
        active = i; stepIndex = 0;
        buildSidebar();
        render();
        closeSidebar();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      document.getElementById("hamburger").addEventListener("click", function () {
        sidebar.classList.toggle("open");
        backdrop.classList.toggle("show");
      });
      backdrop.addEventListener("click", closeSidebar);

      document.addEventListener("keydown", function (e) {
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        var tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        var p = DATA[active];
        if (!p) return;
        if (e.key === "ArrowRight") {
          if (stepIndex < p.steps.length - 1) setStep(stepIndex + 1);
          else if (active < DATA.length - 1) select(active + 1);
        } else if (e.key === "ArrowLeft") {
          if (stepIndex > 0) setStep(stepIndex - 1);
          else if (active > 0) select(active - 1);
        }
      });

      buildSidebar();
      render();
    })();
  </script>
</body>
</html>
