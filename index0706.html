  <!-- Unlayered overrides win over daisyUI's @layer base, so the custom primary + tweaks always apply -->
  <style>
    :root, [data-theme="light"] {
      --color-primary: #2541b2;
      --color-primary-content: #ffffff;
      --color-base-200: #f4f6fc;
      --color-base-300: #e3e8f4;
      --radius-box: 0.85rem;
      --radius-field: 0.5rem;
      color-scheme: light;
    }

    html, body { background: var(--color-base-200); }
    body { font-family: "Inter", ui-sans-serif, system-ui, "Segoe UI", sans-serif; color: #1c2433; }
    * { -webkit-font-smoothing: antialiased; }

    .text-prim { color: var(--color-primary) !important; }

    /* ---------- Layout: navbar + responsive sidebar ---------- */
    .topbar { position: sticky; top: 0; z-index: 60; background: var(--color-base-100); border-bottom: 1px solid var(--color-base-300); }
    .shell { display: block; }
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 286px;
      background: var(--color-base-100); border-right: 1px solid var(--color-base-300);
      transform: translateX(-102%); transition: transform .25s ease;
      z-index: 70; overflow-y: auto; padding: 1rem .6rem;
    }
    .sidebar.open { transform: translateX(0); }
    .backdrop { position: fixed; inset: 0; background: rgba(15,23,42,.42); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 65; }
    .backdrop.show { opacity: 1; pointer-events: auto; }
    .main-col { min-width: 0; }
    #content { max-width: 880px; margin: 0 auto; padding: 1.5rem 1.25rem 3.5rem; }

    @media (min-width: 1024px) {
      .shell { display: grid; grid-template-columns: 286px minmax(0, 1fr); }
      .sidebar { position: sticky; top: 57px; height: calc(100vh - 57px); transform: none; width: auto; z-index: 1; }
      .backdrop, .hamburger { display: none !important; }
    }

    /* ---------- Sidebar menu ---------- */
    .menu .proc-link { display: flex; flex-direction: column; align-items: flex-start; gap: .05rem; padding: .42rem .6rem; }
    .menu .proc-link .proc-name { font-size: .85rem; font-weight: 700; line-height: 1.25; }
    .menu .proc-link.active { background: color-mix(in srgb, var(--color-primary) 12%, transparent); color: var(--color-primary); }
    .menu .proc-link.active .proc-code { color: var(--color-primary); opacity: .85; }
    .proc-code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .68rem; opacity: .5; }
    .menu .cat-title { display:flex; align-items:center; gap:.4rem; padding: .42rem .6rem; font-size: .85rem; font-weight: 700; color: var(--color-base-content); }
    .menu .proc-link.nested { padding-left: 1.2rem; padding-top: .34rem; padding-bottom: .34rem; border-left: 2px solid var(--color-base-300); margin-left: .75rem; }
    .menu .proc-link.nested .proc-name { font-size: .8rem; font-weight: 500; opacity: .88; }
    .menu .proc-link.ref-only .proc-name { opacity: .8; }
    .menu .proc-link.ref-only .ref-badge { font-size: .6rem; font-weight: 600; opacity: .55; border: 1px solid var(--color-base-300); border-radius: .3rem; padding: 0 .3rem; margin-top: .1rem; }

    /* ---------- Wizard: progress rail ---------- */
    .wiz-rail { display: flex; align-items: center; gap: 0; padding: .35rem .2rem; overflow-x: auto; margin-bottom: 1.1rem; }
    .wiz-dot {
      flex: 0 0 auto; width: 1.95rem; height: 1.95rem; border-radius: 9999px;
      display: grid; place-items: center; font-weight: 700; font-size: .8rem;
      border: 2px solid var(--color-base-300); background: var(--color-base-100); color: #9aa3b8;
      cursor: pointer; transition: background-color .15s, border-color .15s, color .15s, box-shadow .15s;
    }
    .wiz-dot:hover { border-color: color-mix(in srgb, var(--color-primary) 50%, var(--color-base-300)); color: var(--color-primary); }
    .wiz-dot.done { background: color-mix(in srgb, var(--color-primary) 13%, #fff); border-color: var(--color-primary); color: var(--color-primary); }
    .wiz-dot.current { background: var(--color-primary); border-color: var(--color-primary); color: #fff; box-shadow: 0 0 0 4px color-mix(in srgb, var(--color-primary) 17%, transparent); }
    .wiz-line { flex: 1 1 auto; height: 2px; min-width: 12px; background: var(--color-base-300); }
    .wiz-line.done { background: var(--color-primary); }

    /* ---------- Wizard: controls ---------- */
    .wiz-controls { display: flex; align-items: center; gap: .75rem; margin-top: 1.1rem; flex-wrap: wrap; }
    .wiz-progress { flex: 1 1 110px; height: 6px; border-radius: 999px; background: var(--color-base-300); overflow: hidden; min-width: 80px; }
    .wiz-progress-bar { height: 100%; background: var(--color-primary); border-radius: 999px; transition: width .25s ease; }
    .wiz-count { font-size: .78rem; opacity: .6; white-space: nowrap; }
    #wizard { scroll-margin-top: 72px; }

    /* ---------- Step card ---------- */
    .step-num { flex: 0 0 auto; width: 1.9rem; height: 1.9rem; border-radius: 9999px; background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; }

    /* ---------- Menu path chips ---------- */
    .menu-path { display: flex; flex-wrap: wrap; align-items: center; gap: .25rem .3rem; }
    .path-seg { background: var(--color-base-200); border: 1px solid var(--color-base-300); border-radius: .4rem; padding: .08rem .45rem; font-size: .76rem; }
    .path-sep { opacity: .35; font-size: .85rem; }

    /* ---------- Prerequisites ---------- */
    .prereq { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .45rem; }
    .prereq li { position: relative; padding-left: 1.05rem; font-size: .82rem; line-height: 1.45; opacity: .85; }
    .prereq li::before { content: ""; position: absolute; left: 0; top: .52em; width: .4rem; height: .4rem; border-radius: 50%; background: var(--color-primary); }

    /* ---------- Markdown body ---------- */
    .md { line-height: 1.6; }
    .md p { margin: .15rem 0; }
    .md strong { font-weight: 600; }
    .md code { font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .85em; background: var(--color-base-200); border: 1px solid var(--color-base-300); padding: .03rem .32rem; border-radius: .32rem; }
    .md ul, .md ol { padding-left: 1.2rem; margin: .25rem 0; }
    .md li { margin: .12rem 0; }
    .md a { color: var(--color-primary); text-decoration: underline; }

    /* ---------- Field table ---------- */
    .field-table th { font-size: .7rem; text-transform: uppercase; letter-spacing: .03em; opacity: .55; font-weight: 600; }
    .field-table td { font-size: .82rem; vertical-align: top; }
    .field-table .val {
      font-family: ui-monospace, "SFMono-Regular", monospace; font-size: .78rem; white-space: nowrap;
      background: color-mix(in srgb, var(--color-primary) 8%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, var(--color-primary) 18%, transparent);
      color: var(--color-primary); padding: .04rem .4rem; border-radius: .35rem;
    }

    /* ---------- Screenshot placeholder (neutral frame, NOT a SAP UI mock) ---------- */
    .shot { display: block; margin: .15rem 0 0; }
    .shot-frame {
      border: 1px dashed color-mix(in srgb, var(--color-primary) 28%, var(--color-base-300));
      border-radius: .7rem;
      background:
        repeating-linear-gradient(45deg, transparent, transparent 11px, color-mix(in srgb, var(--color-primary) 4%, transparent) 11px, color-mix(in srgb, var(--color-primary) 4%, transparent) 12px),
        linear-gradient(180deg, #fbfcff, var(--color-base-200));
      min-height: 176px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .55rem;
      color: #97a1ba; text-align: center; padding: 1.3rem;
    }
    .shot-frame svg { width: 40px; height: 40px; opacity: .5; }
    .shot-img { width: 100%; display: block; border: 1px solid var(--color-base-300); border-radius: .7rem; }
    .shot-label { font-weight: 600; letter-spacing: .03em; font-size: .76rem; text-transform: uppercase; color: #8b95ad; }
    .shot-tag { font-size: .72rem; font-family: ui-monospace, "SFMono-Regular", monospace; background: var(--color-base-100); border: 1px solid var(--color-base-300); border-radius: .4rem; padding: .12rem .55rem; color: #5f6b85; }
    .shot figcaption { margin-top: .5rem; font-size: .79rem; opacity: .72; line-height: 1.45; }
    .shot .fig-no { font-weight: 600; color: var(--color-primary); opacity: .85; }

    /* ---------- Tip ---------- */
    .tip {
      display: flex; gap: .5rem; align-items: flex-start; font-size: .8rem; line-height: 1.45;
      background: color-mix(in srgb, #f59e0b 9%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, #f59e0b 28%, transparent);
      border-left: 3px solid #f59e0b; border-radius: .5rem; padding: .55rem .7rem;
    }
    .tip-ico { flex: 0 0 auto; }

    /* ---------- Attachment ---------- */
    .attachment-chip {
      display: inline-flex; align-items: center; gap: .45rem; align-self: flex-start;
      font-size: .82rem; font-weight: 500; color: var(--color-primary);
      background: var(--color-primary-tint, color-mix(in srgb, var(--color-primary) 8%, var(--color-base-100)));
      border: 1px solid color-mix(in srgb, var(--color-primary) 25%, transparent);
      border-radius: .5rem; padding: .45rem .8rem; text-decoration: none;
    }
    .attachment-chip:hover { background: color-mix(in srgb, var(--color-primary) 14%, var(--color-base-100)); }

    /* ---------- Outcome ---------- */
    .outcome {
      display: flex; gap: .65rem; align-items: flex-start; border-radius: .65rem; padding: .85rem 1rem;
      background: color-mix(in srgb, var(--color-success) 10%, var(--color-base-100));
      border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent);
    }
    .oc-icon { flex: 0 0 auto; width: 1.45rem; height: 1.45rem; border-radius: 50%; background: var(--color-success); color: #fff; display: grid; place-items: center; font-size: .8rem; font-weight: 700; }

    .verified-badge { background: color-mix(in srgb, var(--color-success) 14%, var(--color-base-100)); color: color-mix(in srgb, var(--color-success) 75%, #000); border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent); }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="navbar min-h-0 py-2 px-3 sm:px-4">
      <div class="flex-1 flex items-center gap-3">

        <div class="leading-tight">
          <div class="font-bold text-sm sm:text-base">系統操作流程逐步導覽</div>

        </div>
      </div>
      <div class="flex-none hidden sm:flex items-center gap-2">

      </footer>
    </div>
  </div>

  <script>
    (function () {
      "use strict";
      var DATA = [];
      try { DATA = JSON.parse(document.getElementById("proc-data").textContent || "[]"); } catch (e) { DATA = []; }

      var sidebar = document.getElementById("sidebar");
      var content = document.getElementById("content");
      var backdrop = document.getElementById("backdrop");
      var active = 0;
      var stepIndex = 0;

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
      function md(t) {
        t = t || "";
        if (window.marked && typeof window.marked.parse === "function") return window.marked.parse(t);
        var h = esc(t).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/`(.+?)`/g, "<code>$1</code>");
        return h.split(/\n\s*\n/).map(function (para) { return "<p>" + para.replace(/\n/g, "<br>") + "</p>"; }).join("");
      }
      function renderPath(path) {
        return String(path || "").split(">").map(function (s) {
          return '<span class="path-seg">' + esc(s.trim()) + "</span>";
        }).join('<span class="path-sep">›</span>');
      }

      function buildSidebar() {
        var groups = [];
        DATA.forEach(function (p, i) {
          var g = groups.filter(function (x) { return x.name === p.group; })[0];
          if (!g) { g = { name: p.group, cats: [] }; groups.push(g); }
          var catName = p.category || "";
          var cat = g.cats.filter(function (c) { return c.name === catName; })[0];
          if (!cat) { cat = { name: catName, items: [] }; g.cats.push(cat); }
          cat.items.push({ p: p, i: i });
        });
        var html = '<div class="px-2 pb-2 pt-1"><div class="text-[0.65rem] font-semibold uppercase tracking-wider opacity-45">操作流程</div></div>';
        html += '<ul class="menu w-full p-0 gap-0.5">';
        groups.forEach(function (g) {
          html += '<li class="menu-title px-2 pt-2 pb-1 text-[0.68rem] tracking-wide">' + esc(g.name) + "</li>";
          g.cats.forEach(function (cat) {
            if (cat.name) html += '<li class="cat-title">' + esc(cat.name) + "</li>";
            cat.items.forEach(function (o) {
              var noSteps = !o.p.steps || !o.p.steps.length;
              html += '<li><a class="proc-link' + (cat.name ? " nested" : "") + (noSteps ? " ref-only" : "") + (o.i === active ? " active" : "") + '" data-i="' + o.i + '">' +
                '<span class="proc-name">' + esc(o.p.name) + "</span>" +
                (o.p.code ? '<span class="proc-code">' + esc(o.p.code) + "</span>" : "") +
                (o.p.pending ? '<span class="ref-badge">建置中</span>' : "") +
                "</a></li>";
            });
          });
        });
        html += "</ul>";
        sidebar.innerHTML = html;
        sidebar.querySelectorAll(".proc-link").forEach(function (a) {
          a.addEventListener("click", function () { select(+a.dataset.i); });
        });
      }

      function renderShot(p, s, idx) {
        if (s.images && s.images.length) {
          return s.images.map(function (src) {
            return '<figure class="shot"><img src="' + src + '" alt="' + esc(s.title) + '" class="shot-img" /></figure>';
          }).join("");
        }
        if (!s.screenshot && !s.image) return "";
        if (s.image) {
          return '<figure class="shot">' +
            '<img src="' + s.image + '" alt="' + esc(s.screenshot || s.title) + '" class="shot-img" />' +
            '<figcaption><span class="fig-no">圖 ' + (idx + 1) + ".</span> " + esc(s.screenshot) + "</figcaption>" +
            "</figure>";
        }
        return '<figure class="shot">' +
          '<div class="shot-frame">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 15l-4.5-4.5L7 20"/></svg>' +
          '<div class="shot-label">參考螢幕截圖</div>' +
          '<div class="shot-tag">' + esc(p.code || p.name) + " · 步驟 " + (idx + 1) + "</div>" +
          "</div>" +
          '<figcaption><span class="fig-no">圖 ' + (idx + 1) + ".</span> " + esc(s.screenshot) + "</figcaption>" +
          "</figure>";
      }

      function renderStepCard(p, s, idx) {
        var h = '<div class="card bg-base-100 border border-base-300 shadow-sm"><div class="card-body p-4 sm:p-5 gap-3">';
        h += '<div class="flex items-center gap-3"><div class="step-num">' + (idx + 1) + "</div>" +
          '<h3 class="font-semibold text-base leading-tight">' + esc(s.title) + "</h3></div>";
        h += '<div class="md text-sm">' + md(s.body) + "</div>";
        if (s.fields && s.fields.length) {
          h += '<div class="overflow-x-auto"><table class="table table-sm field-table">' +
            "<thead><tr><th>欄位</th><th>範例輸入</th><th>說明</th></tr></thead><tbody>";
          s.fields.forEach(function (f) {
            h += "<tr><td class=\"font-medium\">" + esc(f.name) + "</td>" +
              '<td><code class="val">' + esc(f.value) + "</code></td>" +
              '<td class="opacity-70">' + esc(f.note) + "</td></tr>";
          });
          h += "</tbody></table></div>";
        }
        h += renderShot(p, s, idx);
        if (s.attachments && s.attachments.length) {
          h += '<div class="flex flex-col gap-2">' + s.attachments.map(function (a) {
            return '<a href="' + a.url + '" download class="attachment-chip">' +
              '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
              '<span>' + esc(a.name) + "</span></a>";
          }).join("") + "</div>";
        }
        if (s.tip) h += '<div class="tip"><span class="tip-ico">💡</span><span>' + esc(s.tip) + "</span></div>";
        h += "</div></div>";
        return h;
      }

      function railHtml(p) {
        var h = '<div class="wiz-rail" role="tablist" aria-label="步驟">';
        p.steps.forEach(function (s, i) {
          var cls = i === stepIndex ? "current" : (i < stepIndex ? "done" : "todo");
          h += '<button class="wiz-dot ' + cls + '" data-s="' + i + '" title="' + esc((i + 1) + ". " + s.title) + '">' +
            (i < stepIndex ? "✓" : (i + 1)) + "</button>";
          if (i < p.steps.length - 1) h += '<span class="wiz-line ' + (i < stepIndex ? "done" : "") + '"></span>';
        });
        h += "</div>";
        return h;
      }

      function controlsHtml(p) {
        var Y = p.steps.length, last = stepIndex === Y - 1;
        var pct = Math.round(((stepIndex + 1) / Y) * 100);
        var nextLabel, nextDisabled = false;
        if (!last) nextLabel = "下一步 →";
        else if (active < DATA.length - 1) nextLabel = "下一個：" + esc(DATA[active + 1].code || DATA[active + 1].name) + " →";
        else { nextLabel = "已完成 ✓"; nextDisabled = true; }
        return '<div class="wiz-controls">' +
          '<button class="btn btn-sm btn-ghost' + (stepIndex === 0 ? " btn-disabled" : "") + '" id="stepPrev">← 上一步</button>' +
          '<div class="wiz-progress"><div class="wiz-progress-bar" style="width:' + pct + '%"></div></div>' +
          '<span class="wiz-count">步驟 ' + (stepIndex + 1) + " / " + Y + "</span>" +
          '<button class="btn btn-sm btn-primary' + (nextDisabled ? " btn-disabled" : "") + '" id="stepNext">' + nextLabel + "</button>" +
          "</div>";
      }

      function outcomeHtml(p) {
        return '<div class="outcome mt-4"><span class="oc-icon">✓</span><div>' +
          '<div class="font-semibold text-sm">結果</div>' +
          '<div class="text-sm opacity-90 mt-0.5">' + esc(p.outcome) + "</div></div></div>";
      }

      function renderWizard() {
        var p = DATA[active];
        var Y = p.steps.length;
        if (stepIndex > Y - 1) stepIndex = Y - 1;
        if (stepIndex < 0) stepIndex = 0;
        var last = stepIndex === Y - 1;
        var w = document.getElementById("wizard");
        var h = railHtml(p) + renderStepCard(p, p.steps[stepIndex], stepIndex) + controlsHtml(p);
        if (last) h += outcomeHtml(p);
        w.innerHTML = h;

        w.querySelectorAll(".wiz-dot").forEach(function (d) {
          d.addEventListener("click", function () { setStep(+d.dataset.s); });
        });
        var sp = document.getElementById("stepPrev");
        if (sp && stepIndex > 0) sp.addEventListener("click", function () { setStep(stepIndex - 1); });
        var sn = document.getElementById("stepNext");
        if (sn) sn.addEventListener("click", function () {
          if (stepIndex < Y - 1) setStep(stepIndex + 1);
          else if (active < DATA.length - 1) select(active + 1);
        });
      }

      function render() {
        var p = DATA[active];
        if (!p) { content.innerHTML = '<div class="p-8 text-center opacity-60">未載入任何操作流程資料。</div>'; return; }
        var noSteps = !p.steps || !p.steps.length;
        var stepHintEl = document.getElementById("stepHint");
        if (stepHintEl) stepHintEl.style.display = noSteps ? "none" : "";
        var h = "";
        h += '<div class="breadcrumbs text-sm opacity-70 py-0"><ul>' +
          "<li>" + esc(p.group) + (p.category ? '</li><li>' + esc(p.category) : "") + '</li><li class="text-prim font-medium">' + esc(p.code || p.name) + "</li></ul></div>";
        h += '<div class="flex flex-wrap items-center gap-2.5 mt-1">' +
          '<h1 class="text-2xl font-bold leading-tight">' + esc(p.name) + "</h1>" +
          (p.code ? '<span class="badge badge-primary badge-lg font-mono">' + esc(p.code) + "</span>" : "") +
          (p.pending ? '<span class="badge badge-sm badge-ghost">教學建置中</span>' :
            (noSteps ? "" : '<span class="badge badge-sm verified-badge">✓ 已驗證</span>')) +
          "</div>";
        h += '<p class="opacity-80 mt-2 max-w-3xl text-[0.95rem]">' + esc(p.summary) + "</p>";

        if (p.code || p.menuPath) {
          h += '<div class="card bg-base-100 border border-base-300 shadow-sm mt-4"><div class="card-body p-4 gap-2">' +
            (p.code ?
              '<div class="flex flex-wrap items-center gap-2">' +
              '<span class="text-[0.68rem] font-semibold uppercase tracking-wider opacity-50">交易碼</span>' +
              '<span class="font-mono text-sm text-prim font-semibold">' + esc(p.code) + "</span></div>" +
              '<div class="menu-path">' + renderPath(p.menuPath) + "</div>"
              : '<div class="flex flex-wrap items-center gap-2">' +
              '<span class="text-[0.68rem] font-semibold uppercase tracking-wider opacity-50">功能磚</span>' +
              '<span class="font-mono text-sm text-prim font-semibold">' + esc(p.menuPath) + "</span></div>") +
            "</div></div>";
        }

        var mediaHtml = "";
        if (p.images && p.images.length) {
          mediaHtml = '<div class="mt-4 flex flex-col gap-3">' + p.images.map(function (img) {
            var isVideo = /^data:video\//.test(img.src);
            var media = isVideo
              ? '<video src="' + img.src + '" class="w-full block" autoplay loop muted playsinline></video>'
              : '<img src="' + img.src + '" alt="' + esc(img.caption || p.name) + '" class="w-full block" />';
            return '<figure class="border border-base-300 rounded-box overflow-hidden bg-base-100">' +
              media +
              (img.caption ? '<figcaption class="text-xs opacity-60 px-3 py-2 border-t border-base-300">' + esc(img.caption) + "</figcaption>" : "") +
              "</figure>";
          }).join("") + "</div>";
        }

        if (noSteps) {
          h += mediaHtml;
          if (p.pending) {
            h += '<div class="card bg-base-100 border border-base-300 shadow-sm mt-4"><div class="card-body p-4 gap-1">' +
              '<div class="flex items-center gap-2 text-sm font-medium"><span>🚧</span><span>此項目的操作教學尚未建置</span></div>' +
              '<p class="opacity-70 text-sm mt-1">目前僅先建立項目位置，內容將於後續補充。</p>' +
              "</div></div>";
          }
          content.innerHTML = h;
          activateVideos();
          return;
        }

        if (p.prerequisites && p.prerequisites.length) {
          h += '<div class="collapse collapse-arrow border border-base-300 bg-base-100 rounded-box mt-3">' +
            '<input type="checkbox" />' +
            '<div class="collapse-title text-sm font-medium">先決條件 <span class="opacity-50">(' + p.prerequisites.length + ")</span></div>" +
            '<div class="collapse-content"><ul class="prereq pb-2">' +
            p.prerequisites.map(function (x) { return "<li>" + esc(x) + "</li>"; }).join("") + "</ul></div></div>";
        }

        h += '<div class="flex items-center gap-2 mt-7 mb-3">' +
          '<h2 class="text-lg font-bold">逐步操作</h2>' +
          '<span class="badge badge-ghost badge-sm">' + p.steps.length + " 個步驟</span></div>";
        h += '<div id="wizard"></div>';
        h += mediaHtml;

        content.innerHTML = h;
        renderWizard();
        activateVideos();
      }

      function activateVideos() {
        content.querySelectorAll("video").forEach(function (v) {
          v.muted = true;
          var p = v.play();
          if (p && p.catch) p.catch(function () {});
        });
      }

      function closeSidebar() { sidebar.classList.remove("open"); backdrop.classList.remove("show"); }

      function setStep(i) {
        var p = DATA[active];
        if (i < 0 || i > p.steps.length - 1) return;
        stepIndex = i;
        renderWizard();
        var w = document.getElementById("wizard");
        if (w) w.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function select(i) {
        if (i < 0 || i >= DATA.length) return;
        active = i; stepIndex = 0;
        buildSidebar();
        render();
        closeSidebar();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      document.getElementById("hamburger").addEventListener("click", function () {
        sidebar.classList.toggle("open");
        backdrop.classList.toggle("show");
      });
      backdrop.addEventListener("click", closeSidebar);

      document.addEventListener("keydown", function (e) {
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        var tag = (e.target && e.target.tagName) || "";
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        var p = DATA[active];
        if (!p) return;
        if (e.key === "ArrowRight") {
          if (stepIndex < p.steps.length - 1) setStep(stepIndex + 1);
          else if (active < DATA.length - 1) select(active + 1);
        } else if (e.key === "ArrowLeft") {
          if (stepIndex > 0) setStep(stepIndex - 1);
          else if (active > 0) select(active - 1);
        }
      });

      buildSidebar();
      render();
    })();
  </script>
</body>
</html>
